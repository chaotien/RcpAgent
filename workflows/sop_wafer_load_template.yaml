# ==============================================================================
# SOP-TBS-001 工具模擬器自動化操作配置 (Cleaned Version)
# Removed redundant 'method' field in detection.
# ==============================================================================

global_config:
  app_name: "ToolBehaviorSimulator.exe"
  enable_ocr: true
  default_timeout: 5.0
  action_post_delay: 0.2
  max_retries: 3
  max_state_loops: 5
  pixel_diff_threshold: 0.05

roi_map:
  top_menu:        [0.0, 0.0,  1.0,  0.10]
  top_right:       [0.8, 0.0,  0.2,  0.10]
  toolbar:         [0.0, 0.10, 1.0,  0.08]
  port_1_control:  [0.0, 0.0, 0.15, 1.0]
  port_2_control:  [0.12, 0.0, 0.20, 1.0]
  engineering_pnl: [0.02, 0.20, 0.35, 0.75]
  schematic_full:  [0.35, 0.0, 0.65, 0.80]
  schematic_p1:    [0.25, 0.0, 0.5, 0.20]
  schematic_p2:    [0.25, 0.20, 0.5, 0.30]
  dialog_center:   [0.25, 0.25, 0.50, 0.50]
  taskbar_area:    [0.0, 0.90, 1.0, 0.10] # [NEW] Windows 工具列專用區域

# ==============================================================================
# [NEW] 全域中斷處理機制 (Global Defense)
# 當任何一個 State 的 detection 找不到目標時，會優先來此尋求救援。
# ==============================================================================
interrupt_handlers:
  - name: "force_restore_window"
    max_triggers: 1  # 每個 State 只允許點擊工具列 1 次，避免死循環
    detection:
      roi: "taskbar_area"
      target_features:
        - { type: "image", path: "$asset_dir/taskbar_app_icon_0.png" }
        - { type: "image", path: "$asset_dir/taskbar_app_icon_1.png" }
    action:
      type: "click_sequence"
      sequence:
        # 巧妙利用: 不給特徵(text/image) 時，click_sequence 會沿用 base (即工具列圖示的座標) 原地點擊
        - { delay: 0.5 } # Click 1: 取得焦點 / 最小化
        - { delay: 0.5 } # Click 2: 狀態切換
        - { delay: 0.5 } # Click 3: 強制置頂還原

states:
  - name: "switch_to_production_mode_s0"
    detection:
      roi: "top_menu"
      target_features:
        - { type: "image", path: "$asset_dir/menu_mode.png" }
    action:
      type: "click"
      move_away: false
    verification:
      type: "appear"
      roi: "top_menu"
      target_features:
        - { type: "image", path: "$asset_dir/menu_productive_mode.png" }
    transitions:
      on_success: "switch_to_production_mode_s1"
      on_fail:
        retry: 2
        fallback: "abort_task"
  - name: "switch_to_production_mode_s1"
    detection:
      roi: "top_menu"
      target_features:
        - { type: "image", path: "$asset_dir/menu_productive_mode.png" }
    action:
      type: "click"
      move_away: false
    verification:
      type: "appear"
      roi: "top_menu"
      target_features:
        - { type: "image", path: "$asset_dir/menu_production.png" }
    transitions:
      on_success: "switch_to_production_mode_s2"
      on_fail:
        retry: 2
        fallback: "abort_task"
  - name: "switch_to_production_mode_s2"
    detection:
      roi: "top_menu"
      target_features:
        - { type: "image", path: "$asset_dir/menu_production.png" }
    action:
      type: "click"
      move_away: false
    verification:
      type: "appear"
      roi: "port_1_control"
      target_features:
        - { type: "image", path: "$asset_dir/prod_load_port.png" }
    transitions:
      on_success: "set_port_1_auto"
      on_fail:
        retry: 2
        fallback: "abort_task"
  - name: "set_port_1_auto"
    detection:
      roi: "port_1_control"
      target_features:
        - { type: "image", path: "$asset_dir/btn_go_auto_gray.png" }
    action:
      type: "click"
    verification:
      type: "appear"
      roi: "port_1_control"
      target_features: 
        - { type: "image", path: "$asset_dir/btn_go_manual_green.png" }
    transitions:
      on_success: "set_port_2_auto"
      on_fail:
        error_branches:
          - condition: { type: "ocr", text: "Go Manual", roi: "port_1_control" }
            next_state: "set_port_2_auto"
        retry: 2
        fallback: "abort_task"

  - name: "set_port_2_auto"
    detection:
      roi: "port_2_control"
      target_features:
        - { type: "image", path: "$asset_dir/btn_go_auto_gray.png" }
    action:
      type: "click"
    verification:
      type: "appear"
      roi: "port_2_control"
      target_features:
        - { type: "image", path: "$asset_dir/btn_go_manual_green.png" }
    transitions:
      on_success: "end_task"
      on_fail:
        error_branches:
          - condition: { type: "image", path: "$asset_dir/btn_go_manual_green.png", roi: "port_2_control" }
            next_state: "end_task"
        retry: 2
        fallback: "abort_task"

  - name: "end_task"
    detection:
      method: "dummy"
    action:
      type: "log"
      message: "SOP-TBS-001 Completed Successfully."